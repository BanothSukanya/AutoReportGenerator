
<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body{font-family:Arial;background:linear-gradient(120deg,#4e54c8,#8f94fb);display:flex;justify-content:center;align-items:center;height:100vh;}
    .box{background:white;padding:25px;border-radius:15px;width:300px;box-shadow:0 10px 25px rgba(0,0,0,0.2);} 
    input,button{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #ccc;}
    button{background:#4e54c8;color:white;border:none;cursor:pointer;}
  </style>
</head>
<body>
<div class="box">
  <h2>Login</h2>
  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p>New user? <a href="signup.html">Create Account</a></p>
</div>
<script>
function login(){ window.location.href="dashboard.html"; }
</script>
</body>
</html>
