<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#dbeafe;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:#6366a1;
      padding:30px;
      border-radius:20px;
      width:350px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      text-align:center;
      color:white;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border-radius:10px;
      border:none;
      background:#f1f5f9;
      color:black;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
      background:#b12939;
      color:white;
      cursor:pointer;
    }

    a{
      color:#facc15;
      text-decoration:none;
      font-weight:bold;
    }

    .input-box{
      position:relative;
    }

    .eye{
      position:absolute;
      right:10px;
      top:14px;
      cursor:pointer;
      color:black;
    }
  </style>
</head>


<div class="box">
  <h2>Login</h2>

  <input type="email" id="loginEmail" placeholder="Email">

  <div class="input-box">
    <input type="password" id="loginPass" placeholder="Password">
    <span class="eye" onclick="togglePass('loginPass')">👁</span>
  </div>

  <button onclick="login()">Login</button>

  <p>New user? 
    <a href="signup.html">Create Account</a>
  </p>
</div>
<script src="script.js"></script>
</body>
</html>
