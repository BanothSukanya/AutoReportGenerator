<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body{margin:0;font-family:Arial;display:flex;background:#dbeafe;}

    .sidebar{
      width:200px;
      background:#2c2f4a;
      color:white;
      padding:20px;
      height:100vh;
      position:fixed;
      top:0;
      left:0;
    }

    .sidebar button{
      width:100%;
      padding:10px;
      background:red;
      color:white;
      border:none;
      border-radius:8px;
    }
    
    .main{
      flex:1;
      padding:20px;
      display:flex;
      flex-direction:column;
      align-items:center;
      margin-left:220px;
    }


   .card{
  background:#f8fafc;   /* light color */
  color:black;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  width:60%;
}
    

    .card h3{
  color:black;
}

    input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  background:white;
  color:black;
}
.section-box{
  background:#e2e8f0;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.section-box textarea{
  width:100%;
  margin-top:8px;
}

.delete-btn{
  background:red;
  color:white;
  border:none;
  padding:5px 10px;
  margin-top:8px;
  border-radius:5px;
}
    .small{width:120px;}

    button.generate{
      background:#b12939;
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:8px;
      cursor:pointer;
    }
   
  </style>
</head>

<body>

<div class="sidebar">
  <h3>Dashboard</h3>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

  <h1 style="text-align:center; color:#04258a; margin-bottom:20px;">
    Report Maker
  </h1>

  <div class="card">
    <h3>Project Details</h3>
    <input placeholder="Project Title">
    <input placeholder="Full Name">
    <input placeholder="Roll No">
    <input placeholder="Department">
    <input placeholder="Section">
    <input placeholder="Counselor">
    <input placeholder="Supervisor">
  </div>

  <div class="card">
    <h3>Report Inputs</h3>

    <label>PPT Upload</label>
    <input type="file">

    <label>Images Upload</label>
    <input type="file" multiple>

    <label>Abstract Upload</label>
    <input type="file">

    <label>Reference Material</label>
    <input type="file">

    <label>Reference Report PDF</label>
    <input type="file">

    <label>Page Count</label>
   <input class="small" type="number" min="0" placeholder="Enter page count">

    <br><br>
    <button class="generate">Generate Report</button>
  </div>
  <div class="card">
  <h3>Dynamic Report Sections</h3>
<img src="C:\Users\banot\Downloads\report" alt="Project Image" width="200">
  <input id="sectionTitle" placeholder="Enter Section Title">
  <button onclick="addSection()">Add Section</button>

  <div id="sectionsContainer"></div>
</div>

</div>

<script>
function logout(){
  window.location.href="login.html";
}
function addSection(){
  let title = document.getElementById("sectionTitle").value;

  if(title === ""){
    alert("Enter section title");
    return;
  }

  let container = document.getElementById("sectionsContainer");

  let div = document.createElement("div");
  div.className = "section-box";

  let heading = document.createElement("h4");
  heading.textContent = title;

  let textarea = document.createElement("textarea");
  textarea.rows = 3;
  textarea.placeholder = "Enter content...";

  let deleteBtn = document.createElement("button");
  deleteBtn.textContent = "Delete";
  deleteBtn.className = "delete-btn";

  deleteBtn.onclick = function(){
    div.remove();
  };

  div.appendChild(heading);
  div.appendChild(textarea);
  div.appendChild(deleteBtn);

  container.appendChild(div);

  document.getElementById("sectionTitle").value = "";
}

</script>



</body>
</html>
